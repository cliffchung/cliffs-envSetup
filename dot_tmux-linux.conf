# Linux tmux config
# Loaded via: if-shell 'test "$(uname)" = "Linux"' 'source ~/.tmux-linux.conf'

# Vi copy-mode with xclip for system clipboard
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xclip -selection clipboard"
bind ] run "xclip -selection clipboard -o | tmux load-buffer - && tmux paste-buffer"
