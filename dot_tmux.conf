# Remap prefix to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Split panes using | and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Clear screen (Alt-l)
bind -n M-l send-keys 'clear\r'

# Mouse support
set -g mouse on

# Reload config
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# Scrollback buffer
set -g history-limit 50000

# Proper terminal and true color support
set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',xterm-256color:Tc'

# Swap windows left/right (stay on the moved window)
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1

# Resize panes (PREFIX + Shift-hjkl)
bind H resize-pane -L 20
bind J resize-pane -D 20
bind K resize-pane -U 20
bind L resize-pane -R 20

# Status bar
set-option -g status on
set -g status-justify centre

# Silence
set -g visual-bell off

# Reduce escape delay (faster vim response)
set -sg escape-time 0

# Focus events for vim autoread
set -g focus-events on

# Vi copy mode
set-window-option -g mode-keys vi

# Don't rename windows automatically
set-option -g allow-rename off
set -g set-titles off

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# vim-tmux-navigator plugin handles C-h/j/k/l bindings automatically
# Copy-mode pane navigation
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Load OS-specific config
if-shell 'test "$(uname)" = "Darwin"' 'source ~/.tmux-osx.conf'
if-shell 'test "$(uname)" = "Linux"' 'source ~/.tmux-linux.conf'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Continuum auto-restore
set -g @continuum-restore 'on'

# Theme
set -g @themepack 'powerline/default/orange'

# Initialize TPM (keep at bottom)
run -b '~/.tmux/plugins/tpm/tpm'
